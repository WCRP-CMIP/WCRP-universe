name: Test dev-latest snapshot

on:
  push:
    branches: [esgvoc_dev]
  pull_request:
    branches: [esgvoc_dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # -----------------------------------------------------------------
      # 1. Setup
      # -----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install esgvoc
        run: uv pip install --system "esgvoc>=4.0.0"

      # -----------------------------------------------------------------
      # 2. Build & validate locally
      # -----------------------------------------------------------------
      - name: Build universe DB
        run: |
          esgvoc admin build-universe \
            --universe-repo WCRP-CMIP/WCRP-universe \
            --universe-ref esgvoc_dev \
            --universe-version dev-latest \
            --output universe-dev.db

      - name: Validate universe DB
        run: esgvoc admin validate universe-dev.db

      # -----------------------------------------------------------------
      # 3. Print publish command for admins
      # -----------------------------------------------------------------
      - name: Print publish command
        run: |
          echo "============================================"
          echo "  Build & validation passed!"
          echo "  To publish, run manually:"
          echo ""
          echo "  gh workflow run publish.yml \\"
          echo "    -R WCRP-CMIP/esgvoc_registry \\"
          echo "    -f project_id=universe \\"
          echo "    -f bump_type=dev-latest"
          echo "============================================"
