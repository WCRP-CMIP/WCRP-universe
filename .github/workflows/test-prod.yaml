name: Test release (PR)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test-and-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-esgvoc

      - name: Build universe DB
        run: |
          esgvoc admin build-universe \
            --universe-repo ${{ github.event.pull_request.head.repo.full_name || github.repository }} \
            --universe-ref ${{ github.event.pull_request.head.sha || github.head_ref || github.ref_name }} \
            --universe-version test \
            --output universe-test.db

      - name: Validate universe DB
        run: esgvoc admin validate universe-test.db

      - name: Detect changes
        id: changes
        uses: ./.github/actions/detect-changes
        with:
          base_sha: ${{ github.event.pull_request.base.sha }}
          github_token: ${{ github.token }}

      - name: Post release preview
        if: steps.changes.outputs.bump_type != 'none'
        env:
          GH_TOKEN: ${{ github.token }}
          BUMP_TYPE: ${{ steps.changes.outputs.bump_type }}
          CURRENT_VERSION: ${{ steps.changes.outputs.current_version }}
          NEXT_VERSION: ${{ steps.changes.outputs.next_version }}
          CHANGELOG: ${{ steps.changes.outputs.changelog }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          BODY=$(cat <<EOF
          ## Release preview

          **Bump type:** \`${BUMP_TYPE}\` (${CURRENT_VERSION} -> ${NEXT_VERSION})

          ### Changelog
          ${CHANGELOG}

          ---
          *This will be applied to the manifest on merge.*
          EOF
          )

          # Delete previous bot comments to avoid spam
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("Release preview")) | .id' \
            | xargs -I {} gh api -X DELETE "repos/${REPO}/issues/comments/{}"

          gh pr comment "${PR_NUMBER}" --body "${BODY}"

      - name: No CV changes
        if: steps.changes.outputs.bump_type == 'none'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "${PR_NUMBER}" \
            --body "## Release preview

          No CV files changed — no release needed."
